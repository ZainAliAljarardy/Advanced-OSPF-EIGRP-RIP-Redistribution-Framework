!
hostname R8
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description ** Link to R9 (EIGRP Domain Internal) **
 ip address 4.4.4.1 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description ** Link to R7 (ASBR - Redistribution Point) **
 ip address 5.5.5.2 255.255.255.252
 negotiation auto
!
! --- EIGRP Routing Configuration ---
!
router eigrp 1
 network 4.4.4.0 0.0.0.3
 network 5.5.5.0 0.0.0.3
! EIGRP Router-ID can be added here for consistency (e.g., eigrp router-id 8.8.8.8)
!
end
