!
hostname R6
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description ** Link to Area 0 (Backbone Core) **
 ip address 11.11.11.2 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet5/0
 description ** Link to Area 1 (Branch Site A) **
 ip address 8.8.8.1 255.255.255.252
 negotiation auto
!
interface GigabitEthernet6/0
 description ** Link to Area 4 (Branch Site B) **
 ip address 7.7.7.1 255.255.255.252
 negotiation auto
!
! --- OSPF Routing Configuration ---
!
router ospf 1
 router-id 6.6.6.6
 log-adjacency-changes
 network 7.7.7.0 0.0.0.3 area 4
 network 8.8.8.0 0.0.0.3 area 1
 network 11.11.11.0 0.0.0.3 area 0
!
end
