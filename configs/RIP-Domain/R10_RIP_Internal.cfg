!
hostname R10
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description ** Link to R7 (ASBR - Redistribution Point) **
 ip address 6.6.6.2 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description ** Link to R11 (RIPv2 Domain Internal) **
 ip address 3.3.3.1 255.255.255.252
 negotiation auto
!
! --- RIPv2 Routing Configuration ---
!
router rip
 version 2
 network 3.0.0.0
 network 6.0.0.0
 no auto-summary
!
end
