!
hostname R7
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description ** Link to EIGRP Domain **
 ip address 5.5.5.1 255.255.255.252
 duplex full
 speed 1000
 negotiation auto
!
interface GigabitEthernet1/0
 description ** Link to RIPv2 Domain **
 ip address 6.6.6.1 255.255.255.252
 negotiation auto
!
interface GigabitEthernet5/0
 description ** Link to OSPF Area 0 (Backbone) **
 ip address 2.2.2.2 255.255.255.252
 negotiation auto
!
! --- EIGRP Configuration ---
!
router eigrp 1
 network 5.5.5.0 0.0.0.3
 redistribute ospf 1 metric 100000 10 255 1 1500
 redistribute rip metric 100000 10 255 1 1500
!
! --- OSPF Configuration ---
!
router ospf 1
 router-id 7.7.7.7
 redistribute eigrp 1 subnets
 redistribute rip subnets
 network 2.2.2.0 0.0.0.3 area 0
!
! --- RIPv2 Configuration ---
!
router rip
 version 2
 network 6.0.0.0
 redistribute eigrp 1 metric 5
 redistribute ospf 1 metric 5
 no auto-summary
!
end
