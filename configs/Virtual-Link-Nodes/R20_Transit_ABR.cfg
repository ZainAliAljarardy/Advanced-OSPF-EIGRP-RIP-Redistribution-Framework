!
hostname R20
!
! --- Interface Configuration ---
!
interface GigabitEthernet5/0
 description ** Link to R4 (Backbone Area 0) **
 ip address 9.9.9.2 255.255.255.252
 negotiation auto
!
interface GigabitEthernet0/0
 description ** Transit Link for Area 6 (Virtual-Link Path) **
 ip address 22.22.22.1 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description ** Transit Link for Area 5 (Virtual-Link Path) **
 ip address 23.23.23.1 255.255.255.252
 negotiation auto
!
! --- OSPF Virtual-Link Configuration ---
!
router ospf 1
 router-id 20.20.20.20
 log-adjacency-changes
 ! Establishing logical tunnels to remote areas
 area 6 virtual-link 21.21.21.21
 area 5 virtual-link 22.22.22.22
 !
 network 9.9.9.0 0.0.0.3 area 0
 network 22.22.22.0 0.0.0.3 area 6
 network 23.23.23.0 0.0.0.3 area 5
 !
end
