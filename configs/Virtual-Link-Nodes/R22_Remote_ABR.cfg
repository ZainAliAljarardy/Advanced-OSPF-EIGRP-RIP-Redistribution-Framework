!
hostname R22
!
! --- Interface Configuration ---
!
interface GigabitEthernet0/0
 description ** Transit Link to R20 (Area 5) **
 ip address 23.23.23.2 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description ** Gateway to Isolated Area 100 **
 ip address 25.25.25.1 255.255.255.252
 negotiation auto
!
! --- OSPF Virtual-Link Configuration ---
!
router ospf 1
 router-id 22.22.22.22
 log-adjacency-changes
 ! Establishing logical tunnel to Backbone via transit Area 5
 area 5 virtual-link 20.20.20.20
 !
 network 23.23.23.0 0.0.0.3 area 5
 network 25.25.25.0 0.0.0.3 area 100
 !
end
