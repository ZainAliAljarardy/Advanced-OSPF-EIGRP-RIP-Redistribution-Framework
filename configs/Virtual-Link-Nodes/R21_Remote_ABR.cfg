!
hostname R21
!
! --- Interface Configuration ---
!
interface GigabitEthernet1/0
 description ** Transit Link to R20 (Area 6) **
 ip address 22.22.22.2 255.255.255.252
 negotiation auto
!
interface GigabitEthernet0/0
 description ** Gateway to Isolated Area 200 **
 ip address 24.24.24.1 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
! --- OSPF Virtual-Link Configuration ---
!
router ospf 1
 router-id 21.21.21.21
 log-adjacency-changes
 ! Logical tunnel back to the Backbone Area 0 via R20
 area 6 virtual-link 20.20.20.20
 !
 network 22.22.22.0 0.0.0.3 area 6
 network 24.24.24.0 0.0.0.3 area 200
 !
end
